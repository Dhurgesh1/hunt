<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Final Challenge</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:600px;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:15px 0;
}

button{
    padding:12px 24px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="card">

<h1>Final Challenge</h1>

<input id="answer" placeholder="Enter code">

<button id="submitBtn">Submit</button>

<div id="status"></div>

</div>

<script>

const supabase = window.supabase.createClient(
    "https://zngzzetiwrywjzosuhgs.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZ3p6ZXRpd3J5d2p6b3N1aGdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDA4NDYsImV4cCI6MjA5NjMxNjg0Nn0.bh6BAMo6T1r4aAHDGy9y9fm_EmZPbkZSUFaHTNWLAwI"
);

document.addEventListener("DOMContentLoaded", ()=>{

    document
    .getElementById("submitBtn")
    .addEventListener("click", submitAnswer);

});

async function submitAnswer(){

    const answer =
    document.getElementById("answer").value;

    document.getElementById("status").innerHTML =
    "Submitting...";

    const result =
    await supabase
    .from("treasure_submissions")
    .insert([
        {
            answer:answer,
            status:"pending"
        }
    ])
    .select();

    if(result.error){

        console.error(result.error);

        document.getElementById("status").innerHTML =
        result.error.message;

        return;
    }

    document.getElementById("status").innerHTML =
    "Submitted successfully.";

}

</script>

</body>
</html>
