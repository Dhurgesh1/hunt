<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

.item{
    background:#1e293b;
    margin-bottom:10px;
    padding:15px;
    border-radius:10px;
}

button{
    margin-right:10px;
    padding:8px 15px;
}
</style>
</head>
<body>

<h1>Admin Panel</h1>

<button id="refreshBtn">
Refresh
</button>

<div id="list"></div>

<script>

const supabase = window.supabase.createClient(
    "https://zngzzetiwrywjzosuhgs.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZ3p6ZXRpd3J5d2p6b3N1aGdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDA4NDYsImV4cCI6MjA5NjMxNjg0Nn0.bh6BAMo6T1r4aAHDGy9y9fm_EmZPbkZSUFaHTNWLAwI"
);

document.addEventListener("DOMContentLoaded", ()=>{

    document
    .getElementById("refreshBtn")
    .addEventListener("click", loadData);

    loadData();

});

async function loadData(){

    const result =
    await supabase
    .from("treasure_submissions")
    .select("*")
    .order("id",{ascending:false});

    console.log(result);

    if(result.error){
        alert(result.error.message);
        return;
    }

    const list =
    document.getElementById("list");

    list.innerHTML = "";

    result.data.forEach(row=>{

        const div =
        document.createElement("div");

        div.className = "item";

        div.innerHTML = `
            <b>ID:</b> ${row.id}<br>
            <b>Answer:</b> ${row.answer}<br>
            <b>Status:</b> ${row.status}<br><br>
        `;

        const approve =
        document.createElement("button");

        approve.textContent =
        "Approve";

        approve.addEventListener(
            "click",
            async ()=>{

                await supabase
                .from("treasure_submissions")
                .update({
                    status:"approved"
                })
                .eq("id",row.id);

                loadData();

            }
        );

        const reject =
        document.createElement("button");

        reject.textContent =
        "Reject";

        reject.addEventListener(
            "click",
            async ()=>{

                await supabase
                .from("treasure_submissions")
                .update({
                    status:"rejected"
                })
                .eq("id",row.id);

                loadData();

            }
        );

        div.appendChild(approve);
        div.appendChild(reject);

        list.appendChild(div);

    });

}

</script>

</body>
</html>
