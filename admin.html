<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Treasure Hunt Admin</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.topbar{
    display:flex;
    gap:10px;

}

button{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.refresh{
    background:#3b82f6;
    color:white;
}

.approve{
    background:#22c55e;

.reject{
    background:#ef4444;

}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

.status{
    margin-top:15px;
    color:#94a3b8;
}

.error{
    color:#f87171;
}

</style>
</head>
<body>

<h1>🔐 Treasure Hunt Admin</h1>

<div class="topbar">
    <button class="refresh" id="refreshBtn">
        Refresh
    </button>
</div>

<div id="status" class="status">
    Loading...
</div>

<div id="submissions"></div>

<script>

const supabase = window.supabase.createClient(
    "https://zngzzetiwrywjzosuhgs.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZ3p6ZXRpd3J5d2p6b3N1aGdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDA4NDYsImV4cCI6MjA5NjMxNjg0Nn0.bh6BAMo6T1r4aAHDGy9y9fm_EmZPbkZSUFaHTNWLAwI"
);

const submissions =
document.getElementById("submissions");

const statusBox =
document.getElementById("status");

document
.getElementById("refreshBtn")
.addEventListener("click", loadData);

async function loadData(){

    statusBox.textContent =
    "Loading submissions...";

    const {data,error} =
    await supabase
    .from("treasure_submissions")
    .select("*")
    .order("id",{ascending:false});

    if(error){

        console.error(error);

        statusBox.innerHTML =
        `<span class="error">${error.message}</span>`;

        return;
    }

    submissions.innerHTML = "";

    if(!data.length){

        submissions.innerHTML =
        "<p>No submissions found.</p>";

        statusBox.textContent =
        "0 submissions";

        return;
    }

    data.forEach(item=>{

        const card =
        document.createElement("div");

        card.className = "card";

        card.innerHTML = `
            <h3>Submission #${item.id}</h3>

            <p>
                <strong>Answer:</strong>
                ${item.answer}
            </p>

            <p>
                <strong>Status:</strong>
                ${item.status}
            </p>

            <br>

            <button
                class="approve"
                data-id="${item.id}">
                Approve
            </button>

            <button
                class="reject"
                data-id="${item.id}">
                Reject
            </button>
        `;

        submissions.appendChild(card);

    });

    statusBox.textContent =
    `${data.length} submissions loaded`;

}

document.addEventListener("click", async (e)=>{

    if(e.target.classList.contains("approve")){

        const id =
        e.target.dataset.id;

        await supabase
        .from("treasure_submissions")
        .update({
            status:"approved"
        })
        .eq("id",id);

        loadData();

    }

    if(e.target.classList.contains("reject")){

        const id =
        e.target.dataset.id;

        await supabase
        .from("treasure_submissions")
        .update({
            status:"rejected"
        })
        .eq("id",id);

        loadData();

    }

});

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
