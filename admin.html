<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

button{
    padding:10px 15px;
    margin-right:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>Admin Panel</h1>

<button id="refreshBtn">Refresh</button>

<div id="submissions"></div>

<script>

const supabase = window.supabase.createClient(
"https://zngzzetiwrywjzosuhgs.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZ3p6ZXRpd3J5d2p6b3N1aGdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDA4NDYsImV4cCI6MjA5NjMxNjg0Nn0.bh6BAMo6T1r4aAHDGy9y9fm_EmZPbkZSUFaHTNWLAwI"
);

document
.getElementById("refreshBtn")
.addEventListener("click", loadData);

async function loadData(){

    const result =
    await supabase
    .from("treasure_submissions")
    .select("*")
    .order("id",{ascending:false});

    if(result.error){
        console.error(result.error);
        alert(result.error.message);
        return;
    }

    const container =
    document.getElementById("submissions");

    container.innerHTML = "";

    result.data.forEach(row=>{

        const card =
        document.createElement("div");

        card.className = "card";

        card.innerHTML = `
            <h3>#${row.id}</h3>
            <p><b>Answer:</b> ${row.answer}</p>
            <p><b>Status:</b> ${row.status}</p>
        `;

        const approveBtn =
        document.createElement("button");

        approveBtn.textContent =
        "Approve";

        approveBtn.onclick =
        async ()=>{

            await supabase
            .from("treasure_submissions")
            .update({
                status:"approved"
            })
            .eq("id",row.id);

            loadData();

        };

        const rejectBtn =
        document.createElement("button");

        rejectBtn.textContent =
        "Reject";

        rejectBtn.onclick =
        async ()=>{

            await supabase
            .from("treasure_submissions")
            .update({
                status:"rejected"
            })
            .eq("id",row.id);

            loadData();

        };

        card.appendChild(approveBtn);
        card.appendChild(rejectBtn);

        container.appendChild(card);

    });

}

loadData();

</script>

</body>
</html>
