<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Challenge</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    color:white;
    padding:20px;
}

.card{
    width:100%;
    max-width:700px;
    background:#1e293b;
    padding:35px;
    border-radius:20px;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

p{
    line-height:1.7;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-bottom:20px;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

.loader{
    width:100%;
    height:20px;
    background:#334155;
    border-radius:999px;
    overflow:hidden;
    margin-top:20px;
}

.progress{
    width:0%;
    height:100%;
    background:#22c55e;
    transition:.5s;
}
</style>
</head>
<body>

<div class="card" id="card">

<h1>🔐 Final Challenge</h1>

<p>
Use everything you've discovered.
<br><br>
Format:
<br>
<b>[crushname@answer]</b>
</p>

<input
id="answer"
placeholder="Enter your code">

<button id="submitBtn">
Submit
</button>

</div>

<script>

const supabase = window.supabase.createClient(
    "https://zngzzetiwrywjzosuhgs.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZ3p6ZXRpd3J5d2p6b3N1aGdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDA4NDYsImV4cCI6MjA5NjMxNjg0Nn0.bh6BAMo6T1r4aAHDGy9y9fm_EmZPbkZSUFaHTNWLAwI"
);

document
.getElementById("submitBtn")
.addEventListener("click", submitAnswer);

async function submitAnswer(){

    const answer =
    document
    .getElementById("answer")
    .value
    .trim();

    if(!answer){
        alert("Enter a code");
        return;
    }

    const {data,error} =
    await supabase
    .from("treasure_submissions")
    .insert([
        {
            answer:answer,
            status:"pending"
        }
    ])
    .select();

    if(error){
        console.error(error);
        alert(error.message);
        return;
    }

    const id = data[0].id;

    document
    .getElementById("card")
    .innerHTML = `
        <h1>⏳ Waiting For Approval</h1>

        <div class="loader">
            <div
            class="progress"
            id="progress"></div>
        </div>

        <p style="margin-top:20px">
            Submission ID: ${id}
        </p>
    `;

    let width = 0;

    setInterval(()=>{

        if(width < 95){

            width++;

            const bar =
            document.getElementById("progress");

            if(bar){
                bar.style.width =
                width + "%";
            }

        }

    },500);

    checkStatus(id);

}

function checkStatus(id){

    setInterval(async()=>{

        const {data,error} =
        await supabase
        .from("treasure_submissions")
        .select("*")
        .eq("id",id)
        .single();

        if(error){
            return;
        }

        if(data.status === "approved"){

            document.body.innerHTML = `
                <div class="card">
                    <h1>🎉 Congratulations</h1>
                    <h2>You solved the mystery.</h2>

                    <h1 style="margin-top:20px">
                        BOY
                    </h1>
                </div>
            `;

        }

        if(data.status === "rejected"){

            alert("Rejected");

            location.reload();

        }

    },3000);

}

</script>

</body>
</html>
